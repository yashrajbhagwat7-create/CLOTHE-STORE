<!DOCTYPE html>
<html>

<head>

    <title>{{ store.name }}</title>

    <link rel="stylesheet"
          href="/static/style.css">

</head>

<body>

<header>


    

    <div class="logo">
        👕 <span>BlueWave Clothing</span>
    </div>

    <nav>

        <a href="/">Home</a>

        <a href="/men">Men</a>

        <a href="/women">Women</a>

        <a href="/kids">Kids</a>

        <a href="/about">About</a>

        <a href="/contact">Contact</a>

    </nav>


</header>

<section class="hero">

<h2>Welcome!</h2>

<p>{{ store.description }}</p>

</section>

<section class="info">

<div class="card">
<h3>Owner</h3>
<p>{{ store.owner }}</p>
</div>

<div class="card">
<h3>Location</h3>
<p>{{ store.location }}</p>
</div>

<div class="card">
<h3>Phone</h3>
<p>{{ store.phone }}</p>
</div>

<div class="card">
<h3>Email</h3>
<p>{{ store.email }}</p>
</div>

<div class="card">
<h3>Store Timing</h3>
<p>{{ store.timing }}</p>
</div>

</section>

</body>

</html>
