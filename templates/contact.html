<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact Us</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <header>
    <div class="logo">
      <span>Clothe Store</span>
    </div>
    <nav>
      <a href="/">Home</a>
      <a href="/men">Men</a>
      <a href="/women">Women</a>
      <a href="/kids">Kids</a>
      <a href="/about">About</a>
      <a href="/contact">Contact</a>
    </nav>
  </header>

  <section class="hero" style="background-image: linear-gradient(rgba(0,0,0,.45), rgba(0,0,0,.45)), url('/static/images/contact-banner.jpg');">
    <h1>Contact Us</h1>
    <h2>We’re here to help</h2>
    <p>Questions about orders, sizing, or products? Send us a message anytime.</p>
    <button onclick="location.href='#contact-form'">Send Message</button>
  </section>

  <div class="section-title">
    <h2 id="contact-form">Send a Message</h2>
    <p>Fill in the details below.</p>
  </div>

  <section class="search-section" style="margin-bottom:80px;">
    <div class="card" style="padding:30px;">
      <form action="#" method="post" onsubmit="event.preventDefault(); alert('Message submitted (demo).');">
        <div style="display:grid; gap:14px;">
          <input style="border-radius:12px;" type="text" name="name" placeholder="Your Name" required />
          <input style="border-radius:12px;" type="email" name="email" placeholder="Email Address" required />
          <input style="border-radius:12px;" type="text" name="subject" placeholder="Subject" required />
          <textarea
            name="message"
            rows="6"
            placeholder="Your Message"
            required
            style="width:100%; padding:18px; border-radius:12px; border:1px solid #ddd; font-size:17px; outline:none;"></textarea>
          <button class="cart-btn" type="submit" style="width:100%;">Submit</button>
        </div>
      </form>
    </div>
  </section>

  <footer>
    <h2>Clothe Store</h2>
    <p>© 2026 Clothe Store. All rights reserved.</p>
  </footer>

  <!-- WhatsApp Button -->
  <a
    href="#"
    aria-label="WhatsApp"
    title="WhatsApp"
    style="position:fixed; right:20px; bottom:20px; z-index:1001; background:#16A34A; color:white; width:60px; height:60px; border-radius:50%; display:flex; align-items:center; justify-content:center; box-shadow:0 10px 30px rgba(0,0,0,.25); font-size:26px; font-weight:700; text-decoration:none;"
  >💬</a>

</body>
</html>
